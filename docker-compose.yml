version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sagu_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: sagu_net
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sagu_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sagu_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: password
      DATABASE_NAME: sagu_net
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production
      PORT: 3000
    depends_on:
      - mysql
    volumes:
      - backend_uploads:/app/uploads

  frontend_user:
    image: nginx:alpine
    container_name: sagu_frontend_user
    restart: unless-stopped
    ports:
      - "5174:80"
    volumes:
      - ./frontend_user/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
